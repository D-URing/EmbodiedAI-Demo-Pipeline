schema_version: "1.0"
updated: "2026-07-14"
purpose: >
  Track model/policy paths used by the demo pipeline. This registry records
  metadata and storage conventions only; it must not contain weights, datasets,
  secrets, or large artifact paths that are only valid on one machine.

storage:
  repo_local_default:
    project_root: "$PWD"
    model_root: "$PROJECT_ROOT/models"
    data_root: "$PROJECT_ROOT/data"
    run_root: "$PROJECT_ROOT/runs"
    checkpoint_root: "$PROJECT_ROOT/checkpoints"
    upstream_root: "$PROJECT_ROOT/upstreams"
    hf_home: "$PROJECT_ROOT/hf_cache"
  override_policy: >
    Defaults are repo-local because the entire project directory is expected to
    live on shared storage during early cluster testing. Override EMBODIED_*,
    HF_HOME, FASTWAM_* or LEROBOT_* only when a cluster requires a different
    mount layout.
  never_commit:
    - model weights
    - datasets
    - checkpoints
    - Hugging Face caches
    - run outputs
    - private real-robot videos

models:
  lerobot_act_pusht:
    status: gpu_smoke_verified
    path_type: lerobot_native
    policy_type: act
    policy_class: lerobot.policies.act.modeling_act.ACTPolicy
    dataset_repo_id: lerobot/pusht
    default_config: configs/lerobot/native_pusht_act_pipeline.sh
    smoke_targets:
      - make lerobot-data-smoke
      - make lerobot-train-smoke
      - make lerobot-infer-smoke
    download_targets:
      - make download-lerobot-artifacts
      - DOWNLOAD_LEROBOT_DATASET=0 DOWNLOAD_LEROBOT_POLICY=1 LEROBOT_POLICY_REPO_ID=<org>/<repo> make download-lerobot-artifacts
    artifact_location:
      dataset_root: "$EMBODIED_DATA_ROOT/lerobot/pusht"
      torch_backbone: "$TORCH_HOME/hub/checkpoints/resnet18-f37072fd.pth"
      policy_path: "$EMBODIED_MODEL_ROOT/lerobot/act/pusht/<checkpoint-or-pretrained-dir>"
    capability_claim: offline_data_to_inference_smoke
    notes:
      - Current first LeRobot-native demo model.
      - SCUT gpu11 verified 2-step GPU training with loss drop 96.987 -> 83.351.
      - Training defaults use dataset.video_backend=pyav and policy.push_to_hub=false.
      - Downloads are disabled by default; set LEROBOT_ALLOW_DOWNLOAD=1 only intentionally.

  lerobot_fastwam:
    status: planned
    path_type: lerobot_native
    policy_type: fastwam
    dataset_repo_id: TBD
    default_config: TBD
    smoke_targets:
      - make lerobot-data-smoke
      - make lerobot-infer-smoke
      - make demo-chain-lerobot-fastwam
    download_targets:
      - DOWNLOAD_LEROBOT_DATASET=0 DOWNLOAD_LEROBOT_POLICY=1 LEROBOT_POLICY_REPO_ID=<fastwam-lerobot-repo> make download-lerobot-artifacts
    artifact_location:
      policy_path: "$EMBODIED_MODEL_ROOT/lerobot/fastwam/<checkpoint-or-pretrained-dir>"
    capability_claim: planned_offline_data_to_inference
    notes:
      - Preferred official FastWAM path inside LeRobot.
      - Must be implemented before claiming FastWAM-native LeRobot inference.

  lerobot_diffusion_pusht:
    status: downloadable_policy
    path_type: lerobot_native
    policy_type: diffusion
    dataset_repo_id: lerobot/pusht
    policy_repo_id: lerobot/diffusion_pusht
    smoke_targets:
      - LEROBOT_POLICY_PATH="$EMBODIED_MODEL_ROOT/lerobot/diffusion/diffusion_pusht" make lerobot-infer-smoke
    download_targets:
      - make download-lerobot-diffusion-pusht-policy
    artifact_location:
      dataset_root: "$EMBODIED_DATA_ROOT/lerobot/pusht"
      policy_path: "$EMBODIED_MODEL_ROOT/lerobot/diffusion/diffusion_pusht"
    capability_claim: downloadable_open_policy_for_inference_smoke
    notes:
      - This complements ACT/PushT training smoke with a downloadable open LeRobot policy.
      - Keep it in the root models pool; pipelines should reference it, not duplicate it.

  lerobot_diffusion_pusht_train:
    status: configured_pending_cluster_verification
    path_type: lerobot_native
    policy_type: diffusion
    dataset_repo_id: lerobot/pusht
    default_config: configs/lerobot/train/pusht_diffusion.sh
    smoke_targets:
      - make lerobot-train-diffusion
    download_targets:
      - make download-lerobot-pusht-dataset
      - make download-lerobot-diffusion-pusht-policy
    artifact_location:
      dataset_root: "$EMBODIED_DATA_ROOT/lerobot/pusht"
      pretrained_policy_path: "$EMBODIED_MODEL_ROOT/lerobot/diffusion/diffusion_pusht"
      training_runs: "$EMBODIED_RUN_ROOT/lerobot/pusht_diffusion_train/"
    capability_claim: second_lerobot_il_training_path
    notes:
      - Use this as the second LeRobot-native policy after ACT.
      - Inference adapter now includes the expected DiffusionPolicy class path.

  lerobot_smolvla_so100:
    status: configured_pending_cluster_verification
    path_type: lerobot_native
    policy_type: smolvla
    dataset_repo_id: lerobot/svla_so100_pickplace
    policy_repo_id: lerobot/smolvla_base
    default_config: configs/lerobot/train/svla_so100_smolvla.sh
    smoke_targets:
      - make lerobot-train-smolvla
    download_targets:
      - make download-lerobot-svla-so100-pickplace-dataset
      - make download-lerobot-smolvla-base-policy
    artifact_location:
      dataset_root: "$EMBODIED_DATA_ROOT/lerobot/svla_so100_pickplace"
      pretrained_policy_path: "$EMBODIED_MODEL_ROOT/lerobot/smolvla/smolvla_base"
      training_runs: "$EMBODIED_RUN_ROOT/lerobot/svla_so100_smolvla_train/"
    capability_claim: first_lerobot_vla_finetuning_path
    notes:
      - This is the first VLA/foundation-model training profile in the LeRobot route.
      - Keep batch size adjustable; start with batch_size=8 on A100/A800 and reduce if needed.

  lerobot_fastwam_libero:
    status: downloaded_on_scut
    path_type: lerobot_native
    policy_type: fastwam
    dataset_repo_id: yuanty/LIBERO-fastwam
    policy_repo_id: lerobot/fastwam_libero_uncond_2cam224
    smoke_targets:
      - LEROBOT_POLICY_TYPE=fastwam LEROBOT_POLICY_PATH="$EMBODIED_MODEL_ROOT/lerobot/fastwam/fastwam_libero_uncond_2cam224" make lerobot-infer-smoke
    download_targets:
      - make download-lerobot-fastwam-libero-policy
    artifact_location:
      release_dataset: "$EMBODIED_DATA_ROOT/fastwam/libero-fastwam/"
      policy_path: "$EMBODIED_MODEL_ROOT/lerobot/fastwam/fastwam_libero_uncond_2cam224"
    capability_claim: lerobot_compatible_fastwam_policy
    notes:
      - This is different from models/fastwam_release, which belongs to the custom/FastWAM route.
      - The downloaded policy contains model.safetensors and normalizer/postprocessor assets.
      - FastWAM LIBERO data is LeRobot v2.1; convert a copy before using the current LeRobot v3 loader.

  lerobot_pi0fast_template:
    status: template_only
    path_type: lerobot_native
    policy_type: pi0_fast
    dataset_repo_id: lerobot/aloha_sim_insertion_human
    default_config: configs/lerobot/train/aloha_pi0fast_template.sh
    capability_claim: heavy_vla_candidate
    notes:
      - Do not put this in first acceptance; keep as the next heavy VLA candidate.

  custom_fastwam_realrobot_overlay:
    status: implemented_scaffold
    path_type: custom_backend
    upstream: yuantianyuan01/FastWAM
    overlay: D-URing/fastwam-realrobot-pipeline
    default_config: configs/fastwam/realrobot_train_eval.sh
    smoke_targets:
      - make fastwam-train-smoke
      - FASTWAM_MODE=pilot FASTWAM_RECIPE=joint_base bash scripts/fastwam/run_realrobot_train_eval.sh
      - make demo-chain-fastwam
    download_targets:
      - make download-fastwam-artifacts
      - HF_ENDPOINT=https://hf-mirror.com bash /home/scut/hfd.sh yuanty/LIBERO-fastwam --dataset --local-dir "$EMBODIED_DATA_ROOT/fastwam/libero-fastwam" --tool aria2c -x 10 -j 4
    artifact_location:
      release_weights: "$EMBODIED_MODEL_ROOT/fastwam_release/"
      release_dataset: "$EMBODIED_DATA_ROOT/fastwam/libero-fastwam/"
      custom_outputs: "$EMBODIED_MODEL_ROOT/custom/fastwam_realrobot/<run>/"
    capability_claim: custom_finetuning_training_evidence
    notes:
      - This is not a from-scratch self-designed model.
      - It is a customized finetuning/realrobot overlay path.
      - FastWAM LIBERO release data is LeRobot v2.1; convert a copy before using the current LeRobot v3 loader.
      - SCUT private overlay clone currently needs GitHub private repository credentials.

  custom_imagewam_flux2_4b_libero:
    status: configured_pending_cluster_download
    path_type: custom_backend
    upstream: yuyangalin/ImageWAM
    policy_family: imagewam
    policy_variant: flux2_4b
    task_type: libero
    policy_repo_id: yuyangalin/ImageWAM-FLUX.2-4B-LIBERO
    default_config: configs/imagewam/libero_train_eval.sh
    smoke_targets:
      - make prepare-imagewam-upstream
      - make download-imagewam-artifacts
      - make download-imagewam-flux2-base
      - make imagewam-train-smoke
    download_targets:
      - make download-imagewam-artifacts
      - make download-imagewam-flux2-base
      - IMAGEWAM_POLICY_REPO_ID=yuyangalin/ImageWAM-FLUX.2-9B-LIBERO IMAGEWAM_POLICY_LOCAL_DIR="$EMBODIED_MODEL_ROOT/imagewam/flux2_klein_9b_libero" make download-imagewam-artifacts
    artifact_location:
      release_dataset: "$EMBODIED_DATA_ROOT/fastwam/libero-fastwam/"
      release_weights: "$EMBODIED_MODEL_ROOT/imagewam/flux2_klein_4b_libero/"
      flux2_base_weights: "$EMBODIED_MODEL_ROOT/imagewam/flux2/"
      upstream_source: "$PROJECT_ROOT/upstreams/ImageWAM/"
      custom_outputs: "$EMBODIED_RUN_ROOT/imagewam/"
    capability_claim: custom_wam_image_editing_backend_candidate
    notes:
      - ImageWAM is parallel to FastWAM under pipelines/custom_wam.
      - Default first target is FLUX.2 4B + LIBERO because it is lighter than 9B and aligns with available LIBERO assets.
      - The first wrapper records metadata and delegates real training to the official ImageWAM scripts after the upstream environment is installed.
      - Do not claim LIBERO/RoboTwin success rates until the simulator/eval wrapper is installed and run.
