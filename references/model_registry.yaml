schema_version: "1.0"
updated: "2026-07-14"
purpose: >
  Track model/policy paths used by the demo pipeline. This registry records
  metadata and storage conventions only; it must not contain weights, datasets,
  secrets, or large artifact paths that are only valid on one machine.

storage:
  repo_local_default:
    project_root: "$PWD"
    model_root: "$PROJECT_ROOT/models"
    data_root: "$PROJECT_ROOT/data"
    run_root: "$PROJECT_ROOT/runs"
    checkpoint_root: "$PROJECT_ROOT/checkpoints"
    upstream_root: "$PROJECT_ROOT/upstreams"
    hf_home: "$PROJECT_ROOT/hf_cache"
  override_policy: >
    Defaults are repo-local because the entire project directory is expected to
    live on shared storage during early cluster testing. Override EMBODIED_*,
    HF_HOME, FASTWAM_* or LEROBOT_* only when a cluster requires a different
    mount layout.
  never_commit:
    - model weights
    - datasets
    - checkpoints
    - Hugging Face caches
    - run outputs
    - private real-robot videos

models:
  lerobot_act_pusht:
    status: gpu_smoke_verified
    path_type: lerobot_native
    policy_type: act
    policy_class: lerobot.policies.act.modeling_act.ACTPolicy
    dataset_repo_id: lerobot/pusht
    default_config: configs/lerobot/native_pusht_act_pipeline.sh
    smoke_targets:
      - make lerobot-data-smoke
      - make lerobot-train-smoke
      - make lerobot-infer-smoke
    download_targets:
      - make download-lerobot-artifacts
      - DOWNLOAD_LEROBOT_DATASET=0 DOWNLOAD_LEROBOT_POLICY=1 LEROBOT_POLICY_REPO_ID=<org>/<repo> make download-lerobot-artifacts
    artifact_location:
      dataset_root: "$EMBODIED_DATA_ROOT/lerobot/pusht"
      torch_backbone: "$TORCH_HOME/hub/checkpoints/resnet18-f37072fd.pth"
      policy_path: "$EMBODIED_MODEL_ROOT/lerobot/act/pusht/<checkpoint-or-pretrained-dir>"
    capability_claim: offline_data_to_inference_smoke
    notes:
      - Current first LeRobot-native demo model.
      - SCUT gpu11 verified 2-step GPU training with loss drop 96.987 -> 83.351.
      - Training defaults use dataset.video_backend=pyav and policy.push_to_hub=false.
      - Downloads are disabled by default; set LEROBOT_ALLOW_DOWNLOAD=1 only intentionally.

  lerobot_fastwam:
    status: planned
    path_type: lerobot_native
    policy_type: fastwam
    dataset_repo_id: TBD
    default_config: TBD
    smoke_targets:
      - make lerobot-data-smoke
      - make lerobot-infer-smoke
      - make demo-chain-lerobot-fastwam
    download_targets:
      - DOWNLOAD_LEROBOT_DATASET=0 DOWNLOAD_LEROBOT_POLICY=1 LEROBOT_POLICY_REPO_ID=<fastwam-lerobot-repo> make download-lerobot-artifacts
    artifact_location:
      policy_path: "$EMBODIED_MODEL_ROOT/lerobot/fastwam/<checkpoint-or-pretrained-dir>"
    capability_claim: planned_offline_data_to_inference
    notes:
      - Preferred official FastWAM path inside LeRobot.
      - Must be implemented before claiming FastWAM-native LeRobot inference.

  lerobot_diffusion_pusht:
    status: downloadable_policy
    path_type: lerobot_native
    policy_type: diffusion
    dataset_repo_id: lerobot/pusht
    policy_repo_id: lerobot/diffusion_pusht
    smoke_targets:
      - LEROBOT_POLICY_PATH="$EMBODIED_MODEL_ROOT/lerobot/diffusion/diffusion_pusht" make lerobot-infer-smoke
    download_targets:
      - make download-lerobot-diffusion-pusht-policy
    artifact_location:
      dataset_root: "$EMBODIED_DATA_ROOT/lerobot/pusht"
      policy_path: "$EMBODIED_MODEL_ROOT/lerobot/diffusion/diffusion_pusht"
    capability_claim: downloadable_open_policy_for_inference_smoke
    notes:
      - This complements ACT/PushT training smoke with a downloadable open LeRobot policy.
      - Keep it in the root models pool; pipelines should reference it, not duplicate it.

  custom_fastwam_realrobot_overlay:
    status: implemented_scaffold
    path_type: custom_backend
    upstream: yuantianyuan01/FastWAM
    overlay: D-URing/fastwam-realrobot-pipeline
    default_config: configs/fastwam/realrobot_train_eval.sh
    smoke_targets:
      - make fastwam-train-smoke
      - FASTWAM_MODE=pilot FASTWAM_RECIPE=joint_base bash scripts/fastwam/run_realrobot_train_eval.sh
      - make demo-chain-fastwam
    download_targets:
      - make download-fastwam-artifacts
      - HF_ENDPOINT=https://hf-mirror.com bash /home/scut/hfd.sh yuanty/LIBERO-fastwam --dataset --local-dir "$EMBODIED_DATA_ROOT/fastwam/libero-fastwam" --tool aria2c -x 10 -j 4
    artifact_location:
      release_weights: "$EMBODIED_MODEL_ROOT/fastwam_release/"
      release_dataset: "$EMBODIED_DATA_ROOT/fastwam/libero-fastwam/"
      custom_outputs: "$EMBODIED_MODEL_ROOT/custom/fastwam_realrobot/<run>/"
    capability_claim: custom_finetuning_training_evidence
    notes:
      - This is not a from-scratch self-designed model.
      - It is a customized finetuning/realrobot overlay path.
      - FastWAM LIBERO release data is LeRobot v2.1; convert a copy before using the current LeRobot v3 loader.
      - SCUT private overlay clone currently needs GitHub private repository credentials.
