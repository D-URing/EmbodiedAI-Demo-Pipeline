schema_version: "1.0"
updated: "2026-07-14"
purpose: >
  Track model/policy paths used by the demo pipeline. This registry records
  metadata and storage conventions only; it must not contain weights, datasets,
  secrets, or large artifact paths that are only valid on one machine.

storage:
  local_default:
    model_root: "$HOME/.cache/embodied-demo/models"
    data_root: "$HOME/.cache/embodied-demo/data"
  cluster_example:
    model_root: "/root/paddlejob/share-storage/gpfs/system-public/dingxibo/models"
    data_root: "/root/paddlejob/share-storage/gpfs/system-public/dingxibo/Embodied_AI/data"
  never_commit:
    - model weights
    - datasets
    - checkpoints
    - Hugging Face caches
    - run outputs
    - private real-robot videos

models:
  lerobot_act_pusht:
    status: implemented_scaffold
    path_type: lerobot_native
    policy_type: act
    policy_class: lerobot.policies.act.modeling_act.ACTPolicy
    dataset_repo_id: lerobot/pusht
    default_config: configs/lerobot/native_pusht_act_pipeline.sh
    smoke_targets:
      - make lerobot-data-smoke
      - make lerobot-train-smoke
      - make lerobot-infer-smoke
    artifact_location:
      dataset_root: "$EMBODIED_DATA_ROOT/lerobot/pusht"
      policy_path: "$EMBODIED_MODEL_ROOT/lerobot/act/pusht/<checkpoint-or-pretrained-dir>"
    capability_claim: offline_data_to_inference_smoke
    notes:
      - Current first LeRobot-native demo model.
      - Downloads are disabled by default; set LEROBOT_ALLOW_DOWNLOAD=1 only intentionally.

  lerobot_fastwam:
    status: planned
    path_type: lerobot_native
    policy_type: fastwam
    dataset_repo_id: TBD
    default_config: TBD
    smoke_targets:
      - make lerobot-data-smoke
      - make lerobot-infer-smoke
      - make demo-chain-lerobot-fastwam
    artifact_location:
      policy_path: "$EMBODIED_MODEL_ROOT/lerobot/fastwam/<checkpoint-or-pretrained-dir>"
    capability_claim: planned_offline_data_to_inference
    notes:
      - Preferred official FastWAM path inside LeRobot.
      - Must be implemented before claiming FastWAM-native LeRobot inference.

  custom_fastwam_realrobot_overlay:
    status: implemented_scaffold
    path_type: custom_backend
    upstream: yuantianyuan01/FastWAM
    overlay: D-URing/fastwam-realrobot-pipeline
    default_config: configs/fastwam/realrobot_train_eval.sh
    smoke_targets:
      - make fastwam-train-smoke
      - FASTWAM_MODE=pilot FASTWAM_RECIPE=joint_base bash scripts/fastwam/run_realrobot_train_eval.sh
      - make demo-chain-fastwam
    artifact_location:
      release_weights: "$EMBODIED_MODEL_ROOT/fastwam_release/"
      custom_outputs: "$EMBODIED_MODEL_ROOT/custom/fastwam_realrobot/<run>/"
    capability_claim: custom_finetuning_training_evidence
    notes:
      - This is not a from-scratch self-designed model.
      - It is a customized finetuning/realrobot overlay path.
