# 这个 YAML 是 LeRobot / pi05 / SO100 8 卡训练探针的主入口配置。
# 日常不要手写一长串 LEROBOT_* 环境变量；优先改这里，然后执行：
#   python experiments/lerobot/pi05_cluster120_2node_probe/run.py --dry-run
#   python experiments/lerobot/pi05_cluster120_2node_probe/run.py

backend: lerobot

# 底层默认配置。run.py 会先读取本 YAML，再把这里的选择转换成 LEROBOT_* 环境变量，
# 最后 source 这个 base_config。一般不要改这个路径。
base_config: configs/lerobot/train/svla_so100_pi05_8gpu_probe.sh

experiment:
  # 实验名会用于 generated config、run 目录和日志命名。
  name: pi05_cluster120_2node_probe
  route: lerobot
  run_name: pi05_cluster120_2node_probe

  # 留空时 run.py 自动生成带时间戳的 run_id。
  # 多机训练时建议显式指定同一个 run_id，确保所有节点写到同一个实验目录。
  run_id:

environment:
  # 这里只用于 preflight 提醒；不会自动创建环境。
  # cluster_120 当前验证环境是 lerobot-sm120；A100/A800 老集群可能是 lerobot。
  conda_env: lerobot-sm120

launch:
  # 这个实验是 cluster_120 两节点 SSH 分布式入口。
  # 日常启动：python experiments/lerobot/pi05_cluster120_2node_probe/run.py
  type: distributed_ssh
  profile: configs/distributed/cluster120_2node.yaml
  launcher_python: /opt/conda/envs/lerobot-sm120/bin/python
  run_id_prefix: pi05_2node

paths:
  # 项目约定：数据、模型、HF cache、运行产物都落在项目目录内，并由 .gitignore 忽略。
  data_root: data
  model_root: models
  run_root: runs/experiments/lerobot
  embodied_run_root: runs
  hf_home: hf_cache
  hf_hub_cache: hf_cache/hub
  hf_datasets_cache: hf_cache/datasets
  torch_home: hf_cache/torch

dataset:
  # make prepare-lerobot-pi05-so100-assets 会准备这个数据集，并补齐 q01/q99 stats。
  repo_id: lerobot/svla_so100_pickplace
  root: data/lerobot/svla_so100_pickplace

  # 当前环境里 torchcodec/FFmpeg 组合容易刷动态库错误；训练已用 pyav 验证。
  video_backend: pyav
  eval_split: ""

policy:
  type: pi05
  repo_id: local/svla_so100_pi05_cluster120_2node_probe
  pretrained_path: models/lerobot/pi05/pi05_base
  push_to_hub: false
  device: cuda

  # A100/A800/新架构 NVIDIA 节点优先 bf16。
  dtype: bfloat16

  # 探针默认关闭 compile，避免首次编译耗时污染测速。
  # 正式吞吐对比时可改 true，并至少跑两次区分 warmup/compile 开销。
  compile_model: false
  gradient_checkpointing: true

training:
  # 当前默认就是已经验证过的快速交差配置：真实 8 卡 2-step。
  # 跑 200-step 探针时改成 steps: 200；长期实验再改到 10000/20000+。
  steps: 2

  # batch_size 是每卡/每进程 batch；有效 batch = batch_size * distributed.num_processes。
  batch_size: 1
  num_workers: 0
  prefetch_factor: 4
  persistent_workers: true
  log_freq: 1

  # 短探针不保存 checkpoint，避免测试时写大文件。
  # 正式训练改成 true，并设置 save_freq。
  save_checkpoint: false
  save_freq: 2

  seed: 1005
  env_eval_freq: 0
  eval_steps: 0
  max_eval_samples: ""
  wandb: false

distributed:
  # 这里保留后端默认值；通过本实验 run.py 启动时，会被 launch.profile 自动覆盖为两节点配置。
  # 多机节点、rank、master 地址不要手写到底层命令里，改 configs/distributed/cluster120_2node.yaml。
  num_processes: 8
  num_machines: 1
  machine_rank: 0
  main_process_ip: 127.0.0.1
  main_process_port: 29505
  mixed_precision: bf16

runtime:
  # 训练节点默认不应该联网；资产准备完成后走离线 cache。
  offline: true
  allow_download: false
  hf_hub_disable_xet: true

  # 默认压低 NCCL 日志，避免 8 卡启动刷几万行拓扑信息。
  # 排查通信问题时改成 INFO。
  nccl_debug: WARN
