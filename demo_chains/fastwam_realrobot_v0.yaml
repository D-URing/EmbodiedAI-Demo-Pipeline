schema_version: "1.0"
chain_id: fastwam_realrobot_v0
name: FastWAM Real-Robot Evidence Chain v0
status: experimental
# custom/FastWAM 证据链定义。
# 用途：把一次真实训练 run 变成可交付材料，包括配置、日志、loss、checkpoint 和边界声明。
# 注意：这里证明“训练链路和 checkpoint 产出”，不证明 RoboDojo/仿真/真机闭环成功。
purpose: >
  Turn FastWAM custom training runs into a deliverable evidence chain with
  CUDA training logs, loss summaries, checkpoint records, and handoff reports.

stages:
  - id: wrapper_validation
    # 先验证脚本语法、schema 和 parser，避免跑到集群才发现入口坏了。
    command: make validate
    required: true
    evidence:
      - shell wrappers parse
      - evidence schemas export

  - id: fastwam_training_pilot
    # 推荐使用 YAML + run.py，而不是手写 FASTWAM_*。
    command: python experiments/custom/fastwam_realrobot_single8_random/run.py
    required: true
    evidence:
      - runs/fastwam/*/backend_manifest.json
      - runs/fastwam/*/loss_summary.json
      - FastWAM native checkpoint path

  - id: evidence_report
    # 对已有 run_dir 生成交付报告。run_dir 来自 runs/experiments/custom/fastwam_realrobot_single8_random/<run_id>。
    command: embodied-demo report-fastwam --run-dir <runs/fastwam/...>
    required: true
    evidence:
      - training_evidence.json
      - checkpoint_summary.json
      - report.md
      - handoff.md

acceptance:
  minimum:
    - training_evidence.validation_status is passed or warning with explicit notes
    - loss_summary.parsed_train_count >= 2
    - loss_summary.loss_decreased is true
    - latest checkpoint path is recorded
  boundary:
    - no claim of RoboDojo benchmark completion
    - no claim of real-robot closed-loop success
    - no CPU fallback for FastWAM
