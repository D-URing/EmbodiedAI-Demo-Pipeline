schema_version: "1.0"
id: drawer_pick_place_v1
version: "1.0.0"
category: articulated_storage
display_name: 打开抽屉取物并放置
difficulty: L3

capabilities:
  primary: [long_horizon, precision]
  secondary: [memory, stability]

instruction:
  canonical: 打开抽屉，取出里面的勺子，并放到桌面托盘中。
  variants:
    - 从抽屉里拿出目标物，放到指定托盘。
    - 先拉开抽屉，再把里面的物品取出来放好。

scene:
  scene_id: drawer_pick_place_mock_v1
  required_objects: [drawer, drawer_handle, spoon, counter_tray, table]
  optional_objects: [distractor_fork]

observation:
  required: [front_rgb, object_states, drawer_state, instruction]
  optional: [wrist_rgb, depth]
  evaluator_only: [ground_truth_poses, drawer_joint_state, placement_predicates]
  debug_only: [mock_state]
  restricted: []

action:
  supported: [semantic]

stages:
  - locate_drawer_handle
  - open_drawer
  - select_target_object
  - grasp_from_drawer
  - place_on_target
  - finalize

termination:
  max_steps: 35
  success: target_object_removed_from_open_drawer_and_placed
  failure:
    - drawer_not_open
    - target_not_visible
    - object_out_of_workspace
    - max_steps_exceeded
    - unsafe_action

backends:
  supported: [mock_2d]
  planned: [robocasa, robotwin, real]

evaluation:
  dimensions: [long_horizon, precision, memory]
  progress_stages:
    - id: locate_drawer_handle
      description: 定位或选择正确抽屉把手。
      predicate: drawer_handle_selected
      weight: 10
    - id: open_drawer
      description: 抽屉从关闭状态切换到打开状态。
      predicate: drawer_opened
      weight: 20
    - id: select_target_object
      description: 在打开的抽屉中选择目标物。
      predicate: target_object_selected_after_opening
      weight: 15
    - id: grasp_from_drawer
      description: 从抽屉中稳定抓取目标物。
      predicate: target_object_grasped_from_drawer
      weight: 20
    - id: place_on_target
      description: 将目标物放到桌面托盘中。
      predicate: target_object_placed_on_tray
      weight: 25
    - id: finalize
      description: 任务满足且策略主动结束。
      predicate: drawer_task_completed_and_terminated
      weight: 10
  standard_layouts: [drawer_layout_a]
  randomization_factors: [drawer_pose, target_object_pose, instruction_variant]

mock:
  realism: symbolic
  limitations:
    - 抽屉只用离散 open/closed 状态表示，不模拟真实关节、摩擦和碰撞。
    - 抓取和放置由谓词推进，不代表实际把手拉取或窄空间取物成功率。

safety:
  labels: [pinch_point_placeholder, workspace_boundary, articulated_object]
  real_execution_allowed: false
  notes:
    - 接真机前必须加入夹手风险、抽屉限位、力/速度限制和急停流程。
