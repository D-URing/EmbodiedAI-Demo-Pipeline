schema_version: "1.0"
id: towel_folding_v1
version: "1.0.0"
category: laundry
display_name: 矩形毛巾两次对折
difficulty: L3

capabilities:
  primary: [precision, long_horizon]
  secondary: [generalization, stability]

instruction:
  canonical: 将铺平的矩形毛巾连续对折两次，使最终边缘尽量对齐。
  variants:
    - 把这条毛巾整齐地叠成四分之一大小。
    - 先沿长边对折，再对折一次并整理边角。

scene:
  scene_id: towel_folding_mock_v1
  required_objects: [rectangular_towel, folding_table]
  optional_objects: [corner_markers]

observation:
  required: [top_rgb, towel_polygon, visible_corners]
  optional: [front_rgb]
  evaluator_only: [ground_truth_polygon, fold_alignment_metrics]
  debug_only: [mock_fold_state]
  restricted: []

action:
  supported: [semantic]

stages:
  - select_corners
  - first_fold
  - first_alignment
  - second_fold
  - final_alignment

termination:
  max_steps: 20
  success: two_folds_complete_and_final_alignment_within_threshold
  failure:
    - towel_out_of_workspace
    - invalid_corner_pair
    - max_steps_exceeded
    - unsafe_action

backends:
  supported: [mock_2d]
  planned: [robodojo, robotwin, real]

evaluation:
  dimensions: [precision, long_horizon, generalization]
  progress_stages:
    - id: select_corners
      description: 选择与第一折对应的正确角点。
      predicate: correct_first_fold_corners_selected
      weight: 10
    - id: first_fold
      description: 完成第一次对折。
      predicate: first_fold_completed
      weight: 25
    - id: first_alignment
      description: 第一次折叠的边缘与角点对齐达标。
      predicate: first_fold_alignment_within_threshold
      weight: 15
    - id: second_fold
      description: 完成第二次对折。
      predicate: second_fold_completed
      weight: 25
    - id: final_alignment
      description: 最终轮廓、面积和角点对齐达到阈值。
      predicate: final_alignment_within_threshold
      weight: 25
  standard_layouts: [centered_horizontal, centered_vertical]
  randomization_factors: [towel_pose, towel_aspect_ratio, instruction_variant]

mock:
  realism: kinematic
  limitations:
    - 仅用二维多边形变换表达折叠，不模拟布料动力学。
    - 不模拟双臂避碰、抓持滑移、皱褶和接触力。

safety:
  labels: [dual_arm_collision_placeholder, workspace_boundary]
  real_execution_allowed: false
  notes:
    - 接真机前必须加入双臂自碰检查、速度限制和软材料抓持策略。
