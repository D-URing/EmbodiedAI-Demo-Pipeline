schema_version: "1.0"

runtime:
  mode: mock
  launcher: local
  seed: 0
  deterministic: true
  output_dir: runs

policy:
  transport: inproc
  device: auto
  supports_batch: false
  config: {}

environment:
  num_envs: 1
  headless: true
  config: {}

evaluation:
  evaluator: predicate
  level: e2_deterministic_mock
  confidence_interval: true

features:
  enable_viewer: false
  enable_video: false
  enable_remote_policy: false
  enable_simulation: false
  enable_real_robot: false

resources:
  policy:
    cpus: 2
    memory_gb: 4
    gpus: 0
  environment:
    cpus: 2
    memory_gb: 4
    gpus: 0
  placement: same_process
  walltime: "00:30:00"
