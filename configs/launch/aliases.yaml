# 项目统一启动别名。
#
# 日常训练/测速不要再手写 scripts/distributed/ssh_launch.py 的长命令；
# 在 trainer0 节点上直接执行：
#
#   ./run.py list
#   ./run.py pi05-2node
#   ./run.py fastwam-2node-smoke
#
# 需要改实验配置时，优先改对应 experiment/config.yaml；
# 需要改集群节点/环境时，优先改 configs/distributed/*.yaml；
# 需要新增一个常用启动入口时，再在本文件新增 alias。

aliases:
  pi05-2node:
    description: "cluster_120 两节点 × 8 卡 LeRobot/pi05 训练入口"
    backend: lerobot
    config: experiments/lerobot/pi05_so100_8gpu_probe/config.yaml
    profile: configs/distributed/cluster120_2node.yaml
    launcher_python: /opt/conda/envs/lerobot-sm120/bin/python
    run_id_prefix: pi05_2node

  fastwam-2node-smoke:
    description: "cluster_120 两节点 × 8 卡 FastWAM 最小连通性 smoke；默认 1 step"
    backend: fastwam
    config: experiments/custom/fastwam_realrobot_2node_smoke/config.yaml
    profile: configs/distributed/cluster120_2node.yaml
    launcher_python: /opt/conda/envs/fastwam-sm120/bin/python
    run_id_prefix: fastwam_smoke

  fastwam-2node-pilot:
    description: "cluster_120 两节点 × 8 卡 FastWAM pilot；用于 smoke 通过后的短实验"
    backend: fastwam
    config: experiments/custom/fastwam_realrobot_single8_random/config.yaml
    profile: configs/distributed/cluster120_2node.yaml
    launcher_python: /opt/conda/envs/fastwam-sm120/bin/python
    run_id_prefix: fastwam_pilot

  pi05-scut:
    description: "SCUT gpu11 单机 8 卡 LeRobot/pi05"
    backend: lerobot
    config: experiments/lerobot/pi05_so100_8gpu_probe/config.yaml
    profile: configs/distributed/scut_gpu11_single.yaml
    launcher_python: /mnt/gpu11_200T/dingxibo/miniconda3/envs/lerobot-cu126/bin/python
    run_id_prefix: pi05_scut

  fastwam-scut:
    description: "SCUT gpu11 单机 8 卡 FastWAM pilot"
    backend: fastwam
    config: experiments/custom/fastwam_realrobot_single8_random/config.yaml
    profile: configs/distributed/scut_gpu11_single.yaml
    launcher_python: /mnt/gpu11_200T/dingxibo/miniconda3/envs/fastwam/bin/python
    run_id_prefix: fastwam_scut
